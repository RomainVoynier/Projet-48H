<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Competence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../Assets/css/competence-detail.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-header">
      <a class="back-link" href="competences.html">
        <span class="material-symbols-outlined">arrow_back</span>
        Retour
      </a>
      <h1 id="competence-title">Competence</h1>
      <p id="competence-short" class="subtitle"></p>
    </header>

    <main>
      <section class="card head-card">
        <img id="competence-image" src="" alt="Illustration competence">
        <div class="meta">
          <span id="competence-status" class="tag waiting">EN ATTENTE</span>
          <p id="competence-code" class="code">CODE</p>
        </div>
      </section>

      <section class="card">
        <h2>Description</h2>
        <p id="competence-description"></p>
      </section>

      <section class="card">
        <h2>Missions associees</h2>
        <ul id="competence-missions"></ul>
      </section>

      <section class="card split">
        <div>
          <h2>Prerequis</h2>
          <p id="competence-prerequis"></p>
        </div>
        <div>
          <h2>Validite</h2>
          <p id="competence-validite"></p>
        </div>
      </section>
    </main>
  </div>

  <script src="../src/script/competence-detail.js"></script>
</body>
</html>
