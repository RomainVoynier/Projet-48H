<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disponibilites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../Assets/css/disponibilites.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-header">
      <div class="status-row">
        <span id="timeDisplay">11:35</span>
        <div class="status-icons"><span class="circle"></span><span class="circle"></span><span class="circle"></span></div>
      </div>
      <span class="material-symbols-outlined menu">menu</span>
      <h1>Disponibilites des Agents</h1>
      <div class="search-wrap">
        <span class="material-symbols-outlined">search</span>
        <input type="search" placeholder="Recherche">
        <span class="material-symbols-outlined">tune</span>
      </div>
    </header>

    <main>
      <section class="calendar-head">
        <h2 id="monthLabel">Mars 2026</h2>
        <div class="switchers">
          <select id="monthSelect" aria-label="Choisir le mois"></select>
          <select id="yearSelect" aria-label="Choisir l'annee"></select>
          <button id="prevMonth" aria-label="Mois precedent"><span class="material-symbols-outlined">chevron_left</span></button>
          <button id="nextMonth" aria-label="Mois suivant"><span class="material-symbols-outlined">chevron_right</span></button>
        </div>
      </section>

      <section class="weekdays">
        <span>lun.</span><span>mar.</span><span>mer.</span><span>jeu.</span><span>ven.</span><span>sam.</span><span>dim.</span>
      </section>

      <section class="calendar-grid" id="calendarGrid"></section>
    </main>

    <nav class="bottom-nav">
      <a href="agents.html"><span class="material-symbols-outlined">groups</span><span>Agents</span></a>
      <a class="active" href="disponibilites.html"><span class="material-symbols-outlined">calendar_month</span><span>Disponibilites</span></a>
      <a href="competences.html"><span class="material-symbols-outlined">inventory_2</span><span>Competences</span></a>
      <a href="documents.html"><span class="material-symbols-outlined">description</span><span>Documents</span></a>
      <a href="inscription.html"><span class="material-symbols-outlined">person_add</span><span>Inscription</span></a>
      <a href="connection.html"><span class="material-symbols-outlined">login</span><span>Connexion</span></a>
    </nav>
  </div>

  <script src="../src/script/disponibilites.js"></script>
  <script src="../src/script/index.js"></script>
</body>
</html>
