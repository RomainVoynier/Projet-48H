<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disponibilites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <link rel="stylesheet" href="../Assets/css/disponibilites.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-header">
      <div class="status-row">
        <span id="timeDisplay">11:35</span>
        <div class="status-icons"><span class="circle"></span><span class="circle"></span><span class="circle"></span></div>
      </div>
      <span class="material-symbols-outlined menu">menu</span>
      <h1>Disponibilites des Agents</h1>
      <div class="search-wrap">
        <span class="material-symbols-outlined">search</span>
        <input type="search" placeholder="Recherche">
        <span class="material-symbols-outlined">tune</span>
      </div>
    </header>

    <main>
      <section class="calendar-head">
        <h2 id="monthLabel">Mars 2026</h2>
        <div class="switchers">
          <select id="monthSelect" aria-label="Choisir le mois"></select>
          <select id="yearSelect" aria-label="Choisir l'annee"></select>
          <button id="prevMonth" aria-label="Mois precedent"><span class="material-symbols-outlined">chevron_left</span></button>
          <button id="nextMonth" aria-label="Mois suivant"><span class="material-symbols-outlined">chevron_right</span></button>
        </div>
      </section>

      <section class="weekdays">
        <span>lun.</span><span>mar.</span><span>mer.</span><span>jeu.</span><span>ven.</span><span>sam.</span><span>dim.</span>
      </section>

      <section class="calendar-grid" id="calendarGrid"></section>
    </main>

    <nav class="bottom-nav">
      <a href="agents.html"><span class="material-symbols-outlined">groups</span><span>Agents</span></a>
      <a class="active" href="disponibilites.html"><span class="material-symbols-outlined">calendar_month</span><span>Disponibilites</span></a>
      <a href="competences.html"><span class="material-symbols-outlined">inventory_2</span><span>Competences</span></a>
      <a href="documents.html"><span class="material-symbols-outlined">description</span><span>Documents</span></a>
      <a href="inscription.html"><span class="material-symbols-outlined">person_add</span><span>Inscription</span></a>
      <a href="connection.html"><span class="material-symbols-outlined">login</span><span>Connexion</span></a>
    </nav>
  </div>

  <script>
    (function () {
      var monthNames = [
        "Janvier", "Fevrier", "Mars", "Avril", "Mai", "Juin",
        "Juillet", "Aout", "Septembre", "Octobre", "Novembre", "Decembre"
      ];
      var monthSelect = document.getElementById("monthSelect");
      var yearSelect = document.getElementById("yearSelect");
      var monthLabel = document.getElementById("monthLabel");
      var calendarGrid = document.getElementById("calendarGrid");
      var prevBtn = document.getElementById("prevMonth");
      var nextBtn = document.getElementById("nextMonth");

      var now = new Date();
      var viewYear = now.getFullYear();
      var viewMonth = now.getMonth();

      function populateSelectors() {
        for (var m = 0; m < monthNames.length; m += 1) {
          var monthOption = document.createElement("option");
          monthOption.value = String(m);
          monthOption.textContent = monthNames[m];
          monthSelect.appendChild(monthOption);
        }

        var startYear = now.getFullYear() - 5;
        var endYear = now.getFullYear() + 5;
        for (var y = startYear; y <= endYear; y += 1) {
          var yearOption = document.createElement("option");
          yearOption.value = String(y);
          yearOption.textContent = String(y);
          yearSelect.appendChild(yearOption);
        }
      }

      function renderCalendar(year, month) {
        var firstDay = new Date(year, month, 1);
        var daysInMonth = new Date(year, month + 1, 0).getDate();
        var startOffset = (firstDay.getDay() + 6) % 7;
        var prevMonthDays = new Date(year, month, 0).getDate();

        monthLabel.textContent = monthNames[month] + " " + year;
        monthSelect.value = String(month);
        yearSelect.value = String(year);

        calendarGrid.innerHTML = "";

        for (var i = 0; i < startOffset; i += 1) {
          var prevCell = document.createElement("div");
          prevCell.className = "cell muted";
          prevCell.textContent = String(prevMonthDays - startOffset + i + 1);
          calendarGrid.appendChild(prevCell);
        }

        for (var d = 1; d <= daysInMonth; d += 1) {
          var dayCell = document.createElement("button");
          dayCell.type = "button";
          dayCell.className = "cell";
          dayCell.textContent = String(d);

          if (d === now.getDate() && month === now.getMonth() && year === now.getFullYear()) {
            dayCell.classList.add("today");
          }

          calendarGrid.appendChild(dayCell);
        }

        var totalCells = startOffset + daysInMonth;
        var trailing = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (var t = 1; t <= trailing; t += 1) {
          var nextCell = document.createElement("div");
          nextCell.className = "cell muted";
          nextCell.textContent = String(t);
          calendarGrid.appendChild(nextCell);
        }
      }

      function shiftMonth(delta) {
        viewMonth += delta;
        if (viewMonth < 0) {
          viewMonth = 11;
          viewYear -= 1;
        } else if (viewMonth > 11) {
          viewMonth = 0;
          viewYear += 1;
        }
        renderCalendar(viewYear, viewMonth);
      }

      monthSelect.addEventListener("change", function (event) {
        viewMonth = Number(event.target.value);
        renderCalendar(viewYear, viewMonth);
      });

      yearSelect.addEventListener("change", function (event) {
        viewYear = Number(event.target.value);
        renderCalendar(viewYear, viewMonth);
      });

      prevBtn.addEventListener("click", function () {
        shiftMonth(-1);
      });

      nextBtn.addEventListener("click", function () {
        shiftMonth(1);
      });

      populateSelectors();
      renderCalendar(viewYear, viewMonth);
    })();
  </script>
  <script src="../src/script/index.js"></script>
</body>
</html>
